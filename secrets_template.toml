# Pour usage local : copiez en .streamlit/secrets.toml

SPREADSHEET_ID = "VOTRE_SPREADSHEET_ID_ICI"
N8N_WEBHOOK_URL = "https://VOTRE_INSTANCE_N8N/webhook/veille-presse-envoi"
DEFAULT_DEST_EMAIL = "destinataire@example.com"
DEFAULT_DEST_NOM = "Prénom Nom"

[gcp_service_account]
type = "service_account"
project_id = "votre-project-id"
private_key_id = "votre-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nVOTRE_CLE_PRIVEE\n-----END PRIVATE KEY-----\n"
client_email = "votre-service-account@votre-project.iam.gserviceaccount.com"
client_id = "123456789"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/votre-service-account%40votre-project.iam.gserviceaccount.com"
